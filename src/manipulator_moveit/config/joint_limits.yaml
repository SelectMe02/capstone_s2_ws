# joint_limits.yaml allows the dynamics properties specified in the URDF
# to be overwritten or augmented as needed.

default_velocity_scaling_factor: 0.1
default_acceleration_scaling_factor: 0.1

# Specific joint properties can be changed with the keys
# [max_position, min_position, max_velocity, max_acceleration].
# Joint limits can be turned off with
# [has_velocity_limits, has_acceleration_limits].
joint_limits:
  joint1:
    has_velocity_limits: true
    max_velocity: 4.796164779
    has_acceleration_limits: true
    max_acceleration: 18.7253757
  joint2:
    has_velocity_limits: true
    max_velocity: 4.796164779
    has_acceleration_limits: true
    max_acceleration: 18.7253757
  joint3:
    has_velocity_limits: true
    max_velocity: 4.796164779
    has_acceleration_limits: true
    max_acceleration: 18.7253757
  joint4:
    has_velocity_limits: true
    max_velocity: 4.796164779
    has_acceleration_limits: true
    max_acceleration: 18.7253757
