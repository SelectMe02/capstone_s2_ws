controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4

    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    # MoveIt이 기본으로 FollowJointTrajectory 액션을 호출하므로 그대로 둠
    # (goal_time 등은 선택)
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false