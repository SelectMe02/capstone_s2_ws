controller_manager:
  ros__parameters:
    update_rate: 100

    # joint_state_broadcaster: /joint_states 퍼블리시
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # MoveIt이 붙을 FollowJointTrajectory 액션 서버 제공
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    # 실전에서 튕김 줄이는 옵션들 (mock에서도 안전)
    allow_partial_joints_goal: false
    open_loop_control: true
    allow_integration_in_goal_trajectories: true

    # Trajectory/Goal 기본값
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

    # (선택) 상태/명령 publish 주기
    state_publish_rate: 50.0
    action_monitor_rate: 20.0